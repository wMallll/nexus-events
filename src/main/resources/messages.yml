# --- Modo torneo (bloqueo de eliminados) ---
lockout:
  kick: "<red>Fuiste eliminado del evento oficial: no podés volver a entrar hasta el próximo evento."
  commands-blocked: "<prefix><red>Estás eliminado del evento oficial: no podés ejecutar comandos."
  usage: "<prefix><red>Usá: <gray>/evento lockout (on|off|clear)"
  enabled: "<prefix><green>Modo torneo <bold>ACTIVADO</bold>: los eliminados quedan bloqueados hasta que ejecutes <gray>/evento lockout clear</gray>."
  disabled: "<prefix><yellow>Modo torneo desactivado: los eliminados pueden seguir participando (ideal para pruebas)."
  cleared: "<prefix><green>Registro limpiado: <yellow><count></yellow> jugadores liberados."
  status: "<prefix><gray>Modo torneo: <state> <dark_gray>| <gray>Bloqueados: <yellow><count>"
  state-on: "<green>ACTIVADO"
  state-off: "<red>desactivado"

# --- Setup del Parkour por islas ---
parkour-setup:
  usage: "<prefix><red>Usá: <gray>/evento parkour (pos1|pos2|add|remove (n)|list|clear)"
  pos-set: "<prefix><green>Posición <yellow><corner></yellow> del fragmento marcada en tu ubicación."
  need-positions: "<prefix><red>Primero marcá las dos esquinas con <gray>/evento parkour pos1</gray> y <gray>pos2</gray>."
  different-worlds: "<prefix><red>Las dos posiciones deben estar en el mismo mundo."
  fragment-added: "<prefix><green>Fragmento <yellow>#<index></yellow> agregado (<dimensions>) a la arena <yellow><arena></yellow>. Marcá el siguiente."
  fragment-removed: "<prefix><green>Fragmento <yellow>#<index></yellow> eliminado. Quedan <yellow><count></yellow> (renumerados)."
  fragment-not-found: "<prefix><red>Ese fragmento no existe. Hay <yellow><count></yellow>; mirá <gray>/evento parkour list</gray>."
  list-header: "<prefix><gray>Fragmentos de <yellow><arena></yellow> (<count>), en orden de desintegración:"
  list-entry: " <dark_gray>#<index> <gray><dimensions>"
  list-empty: "<prefix><gray>La arena no tiene fragmentos todavía. Empezá con <yellow>/evento parkour pos1</yellow>."
  cleared: "<prefix><green>Se eliminaron <yellow><count></yellow> fragmentos."

