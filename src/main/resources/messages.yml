# ============================================================
#  NexusEvents - Mensajes
#
#  Formatos soportados (se pueden mezclar en un mismo mensaje):
#    - Codigos legacy:      &a, &l, &o ...
#    - Colores HEX:         &#FF5500
#    - MiniMessage:         <gradient:#00E5FF:#2E6BFF>, <bold>, <red> ...
#
#  Placeholders globales:
#    - <prefix>  -> el prefijo definido abajo.
#
#  Cualquier mensaje puede convertirse en una lista YAML para
#  enviarse como varias lineas.
# ============================================================

prefix: "<gradient:#00E5FF:#2E6BFF><bold>Eventos</bold></gradient> <dark_gray>» "

general:
  no-permission: "<prefix><red>No tenés permiso para ejecutar este comando."
  unknown-command: "<prefix><red>Subcomando desconocido: <yellow><input></yellow>. Usá <gray>/evento help</gray>."
  reload-success: "<prefix><green>Configuración recargada correctamente en <yellow><time>ms</yellow>."
  player-only: "<prefix><red>Este comando solo puede ejecutarse dentro del juego."
  version: "<prefix><gray>Plugin: <yellow>v<version></yellow> <dark_gray>| <gray>Servidor: <yellow><server></yellow> <dark_gray>(<gray><platform></gray><dark_gray>)"

arena:
  create-usage: "<prefix><red>Usá: <gray>/evento createarena</gray> seguido del nombre de la arena."
  select-usage: "<prefix><red>Usá: <gray>/evento select</gray> seguido del nombre de la arena."
  delete-usage: "<prefix><red>Usá: <gray>/evento deletearena</gray> seguido del nombre de la arena."
  invalid-name: "<prefix><red>Nombre inválido. Usá letras, números, guiones o guion bajo (máximo 32 caracteres)."
  already-exists: "<prefix><red>Ya existe una arena llamada <yellow><arena></yellow>."
  not-found: "<prefix><red>No existe ninguna arena llamada <yellow><arena></yellow>."
  created: "<prefix><green>Arena <yellow><arena></yellow> creada y seleccionada para edición."
  deleted: "<prefix><green>Arena <yellow><arena></yellow> eliminada definitivamente."
  delete-confirm: "<prefix><yellow>Esta acción es permanente. Confirmá con: <gray>/evento deletearena <arena> confirm"
  selected: "<prefix><green>Ahora estás editando la arena <yellow><arena></yellow>."
  none-selected: "<prefix><red>No tenés ninguna arena seleccionada. Usá <gray>/evento select</gray> primero."
  saved-all: "<prefix><green>Se guardaron <yellow><count></yellow> arenas en disco."
  point-set: "<prefix><green><point> establecido en la arena <yellow><arena></yellow>."
  region-usage: "<prefix><red>Usá: <gray><usage></gray> parado en la esquina correspondiente."
  region-corner-set: "<prefix><green>Esquina <yellow><corner></yellow> marcada para <yellow><region></yellow>. <gray>Marcá la otra esquina para completar."
  region-set: "<prefix><green><region> definida en la arena <yellow><arena></yellow> <gray>(<dimensions>)</gray>."
  region-world-mismatch: "<prefix><red>Las dos esquinas deben estar en el mismo mundo."
  list-header: "<prefix><gray>Arenas registradas (<yellow><count></yellow>):"
  list-entry: " <dark_gray>• <yellow><arena> <gray>— <points> puntos, <regions> regiones"
  list-empty: "<prefix><gray>No hay ninguna arena creada todavía. Usá <yellow>/evento createarena</yellow>."
  info-header: "<prefix><gray>Configuración de la arena <yellow><arena></yellow>:"
  info-point: " <dark_gray>• <gray><point>: <yellow><location>"
  info-region: " <dark_gray>• <gray><region>: <yellow><dimensions>"
  info-empty: " <dark_gray>• <gray>Sin puntos ni regiones configurados todavía."
  point-names:
    spawn: "Spawn del evento"
    lobby: "Lobby"
    hunter-spawn: "Spawn del cazador"
    circle-center: "Centro del círculo"
  region-names:
    pixel-party: "Plataforma de Pixel Party"
    parkour: "Zona de Parkour"

event:
  names:
    hide-and-seek: "Escondete si puedes"
    pixel-party: "Pixel Party"
    parkour: "Parkour Colapsable"
    circle: "El Círculo"
  states:
    waiting: "Esperando"
    countdown: "Comenzando"
    running: "En juego"
    ending: "Finalizando"
  announce-open:
    - ""
    - "<prefix><aqua>¡El evento <yellow><event></yellow> abrió en la arena <yellow><arena></yellow>!"
    - "<prefix><gray>Entrá con <yellow>/evento join</yellow>"
    - ""
  start-usage: "<prefix><red>Usá: <gray>/evento start (evento) (arena)</gray>. Mirá los eventos con <gray>/evento events</gray>."
  started-by: "<prefix><green>Evento <yellow><event></yellow> iniciado en la arena <yellow><arena></yellow>."
  event-not-found: "<prefix><red>No existe ningún evento llamado <yellow><event></yellow>. Mirá la lista con <gray>/evento events</gray>."
  arena-in-use: "<prefix><red>La arena <yellow><arena></yellow> ya tiene un evento activo."
  arena-incomplete: "<prefix><red>La arena <yellow><arena></yellow> no está lista para este evento. Falta configurar: <yellow><missing></yellow>."
  stopped: "<prefix><green>Evento detenido en la arena <yellow><arena></yellow>."
  cancelled: "<prefix><red>El evento fue cancelado por un administrador."
  none-active: "<prefix><red>No hay ningún evento activo en este momento."
  specify-arena: "<prefix><red>Hay varios eventos activos. Indicá la arena: <gray><usage></gray>."
  joined: "<prefix><green>Entraste al evento <yellow><event></yellow>. ¡Preparate!"
  player-joined: "<prefix><gray><player> <green>entró al evento <gray>(<count>/<max>)</gray>"
  left: "<prefix><gray>Saliste del evento. Tu inventario y posición fueron restaurados."
  player-left: "<prefix><gray><player> salió del evento."
  already-in: "<prefix><red>Ya estás participando de un evento. Salí con <gray>/evento leave</gray>."
  full: "<prefix><red>El evento está lleno."
  already-started: "<prefix><red>Ese evento ya comenzó, no podés entrar."
  not-in: "<prefix><red>No estás participando de ningún evento."
  countdown-start: "<prefix><yellow>¡El evento comienza en <seconds> segundos!"
  countdown-aborted: "<prefix><red>No hay suficientes jugadores. Esperando más participantes..."
  started: "<prefix><green><bold>¡El evento comenzó!"
  player-eliminated: "<prefix><red><player> <gray>fue eliminado. Quedan <yellow><count></yellow> jugadores."
  winner:
    - ""
    - "<prefix><gold><bold>¡<winner> ganó el evento <event>!"
    - ""
  ended-no-winner: "<prefix><gray>El evento terminó sin ganador."
  ended-timeout: "<prefix><gray>El evento terminó por tiempo."
  cancelled-not-enough: "<prefix><red>El evento se canceló por falta de jugadores <gray>(mínimo <min>)</gray>."
  types-header: "<prefix><gray>Eventos disponibles (<yellow><count></yellow>):"
  types-entry: " <dark_gray>• <yellow><id> <dark_gray>— <gray><name>"
  types-empty: "<prefix><gray>Todavía no hay eventos registrados."
  sessions-header: "<prefix><gray>Eventos activos:"
  sessions-entry: " <dark_gray>• <yellow><arena> <dark_gray>— <gray><event> <dark_gray>(<gray><state>, <players> jugadores<dark_gray>)"
  sessions-none: " <dark_gray>• <gray>Ninguno."
  restored-late: "<prefix><green>Tu inventario y posición del evento anterior fueron restaurados."
  hide-and-seek:
    you-are-hunter: "<prefix><red>¡Sos el cazador! Esperá a que todos se escondan."
    hunter-is: "<prefix><gray>El cazador es <red><player></red>. ¡Escondete!"
    hunt-started: "<prefix><red><bold>¡El cazador salió a cazar!"
    eliminated-info:
      - "<prefix><red>¡Fuiste atrapado!"
      - "<prefix><gray>Ahora sos invisible y podés volar para mirar el evento."
      - "<prefix><yellow>⚠ Si salís del servidor voluntariamente no vas a poder volver."
    disconnect-wait: "<prefix><yellow><player> se desconectó. Tiene <time> para reconectarse."
    reconnected: "<prefix><green><player> se reconectó al evento."
    reconnect-expired: "<prefix><red><player> no volvió a tiempo y quedó fuera del evento."
    new-hunter: "<prefix><red><player> es el nuevo cazador."
    survivors-win:
      - ""
      - "<prefix><gold><bold>¡Los escondidos sobrevivieron!</bold> <gray>Ganadores: <yellow><winners>"
      - ""
  pixel-party:
    round: "<prefix><gray>Ronda <yellow><round></yellow>: buscá <color><bold><colorname></bold>"
    eliminated-info:
      - "<prefix><red>¡Caíste! Quedaste eliminado."
      - "<prefix><gray>Ahora sos invisible y podés volar para mirar el evento."
    winners:
      - ""
      - "<prefix><gold><bold>¡Fin del tiempo!</bold> <gray>Ganadores: <yellow><winners>"
      - ""
  parkour:
    collapse-start: "<prefix><red><bold>¡El recorrido está colapsando desde el inicio!"
    eliminated-info:
      - "<prefix><red>¡Caíste! Quedaste eliminado."
      - "<prefix><gray>Ahora sos invisible y podés volar para mirar el evento."
    winners:
      - ""
      - "<prefix><gold><bold>¡Fin del tiempo!</bold> <gray>Sobrevivientes del colapso: <yellow><winners>"
      - ""

