# ============================================================
#  NexusEvents - Configuracion principal
# ============================================================

settings:
  # Muestra informacion detallada de carga y depuracion en consola.
  debug: false

  # Identificador de idioma. Reservado para soportar multiples
  # archivos de mensajes (messages_<language>.yml) a futuro.
  language: "es"

# ============================================================
#  Ajustes globales del sistema de eventos.
#  Las duraciones aceptan sufijos: t (ticks), s, m, h.
#  Un numero sin sufijo se interpreta como segundos.
# ============================================================
events:
  # Jugadores minimos para comenzar y maximos por evento.
  min-players: 2
  max-players: 40

  # Tiempo maximo de espera en el lobby antes de cancelar
  # por falta de jugadores.
  lobby-timeout: "120s"

  # Duracion de la cuenta regresiva previa al inicio.
  countdown: "15s"

  # Duracion maxima por defecto de un evento (los eventos pueden
  # definir la suya propia en sus archivos).
  max-duration: "10m"

  # Titulo mostrado durante los ultimos 5 segundos de la cuenta
  # regresiva. Placeholder disponible: <seconds>
  countdown-title:
    title: "<yellow><bold><seconds>"
    subtitle: "<gray>¡El evento está por comenzar!"
    fade-in: 0
    stay: 25
    fade-out: 5
    enabled: true
