# ============================================================
#  NexusEvents - Escondete si puedes
#
#  Duraciones: aceptan sufijos t (ticks), s, m, h.
#  Textos: soportan legacy (&a), HEX (&#RRGGBB) y MiniMessage.
# ============================================================

settings:
  # Tiempo que tienen los jugadores para esconderse.
  hide-duration: "30s"

  # Cuenta regresiva final antes de que salga el cazador.
  release-countdown: "5s"

  # Duracion total maxima del evento (incluye el escondite).
  # Si el cazador no atrapa a todos, ganan los escondidos.
  max-duration: "5m"

  # Cantidad de cazadores (siempre queda al menos un escondido).
  hunter-count: 1

  # Si es true, el cazador solo elimina golpeando con su arma.
  require-weapon: true

  # Politica de desconexion: una perdida de conexion, timeout o
  # crash del cliente produce un kick del servidor y SIEMPRE abre
  # la ventana de reconexion. Con true, una desconexion limpia
  # (el jugador presiona Desconectar) cuenta como abandono
  # definitivo; con false, tambien abre la ventana.
  treat-quit-as-voluntary: true

  # Tiempo que tiene un desconectado involuntario para volver.
  reconnect-window: "60s"

weapon:
  # Material del arma del cazador (nomenclatura moderna,
  # se traduce automaticamente en versiones antiguas).
  material: STICK
  name: "<red><bold>Cazador"
  lore:
    - "<gray>Golpeá a un escondido"
    - "<gray>para eliminarlo."
  # Formato: ENCANTAMIENTO:NIVEL (nombres modernos).
  enchantments:
    - "UNBREAKING:1"

titles:
  # Placeholder disponible: <seconds>
  hiding:
    title: "<green><bold><seconds>"
    subtitle: "<gray>¡Escondete rápido!"
    fade-in: 0
    stay: 25
    fade-out: 5
    enabled: true
  release:
    title: "<red><bold><seconds>"
    subtitle: "<gray>El cazador sale a cazar..."
    fade-in: 0
    stay: 25
    fade-out: 5
    enabled: true
  hunter-assigned:
    title: "<red><bold>SOS EL CAZADOR"
    subtitle: "<gray>Esperá a que todos se escondan"
    fade-in: 5
    stay: 60
    fade-out: 10
    enabled: true
  hunt-started:
    title: "<red><bold>¡EL CAZADOR SALIÓ!"
    subtitle: "<gray>Que no te atrape"
    fade-in: 0
    stay: 50
    fade-out: 10
    enabled: true

# Contador visible (actionbar, cada segundo).
# Placeholders: <time>, <alive> (escondidos vivos), <hunters>
actionbar:
  hiding: "<green>Tiempo para esconderse: <yellow><time>"
  release: "<red>El cazador sale en <yellow><time>"
  hunting: "<gray>Tiempo: <yellow><time> <dark_gray>| <gray>Escondidos: <green><alive> <dark_gray>| <gray>Cazadores: <red><hunters>"
